name: "Epiq AWS UAT Infrastructure & App"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-uat:
    name: "Build, Scan, & Deploy UAT Engine"
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛡️ File System Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::425629232565:role/epiq-github-oidc-role
          aws-region: ap-southeast-1

      - name: 🐳 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: epiq-discovery-engine
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build and tag the image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Snipe the old 'latest' tag out of ECR to bypass the immutability lock
          aws ecr batch-delete-image --repository-name $ECR_REPOSITORY --image-ids imageTag=latest --region ap-southeast-1 || true
          
          # Push the fresh images
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: 🔄 Trigger ECS Rolling Update
        run: |
          aws ecs update-service --cluster epiq-discovery-cluster --service epiq-discovery-service --force-new-deployment