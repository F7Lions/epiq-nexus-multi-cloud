name: Deploy Azure PROD Landing Zone

on:
  workflow_dispatch: # Allows us to trigger this manually

jobs:
  deploy-azure-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az group create --name "Epiq-PROD-RG" --location "southeastasia"

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: "Epiq-PROD-RG"
          template: ./bicep-azure/main.bicep
          failOnStdErr: false