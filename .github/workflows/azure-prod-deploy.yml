name: Deploy Azure PROD Landing Zone

on:
  workflow_dispatch:

jobs:
  deploy-azure-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group & Register Providers
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az group create --name "Epiq-PROD-RG" --location "southeastasia"
            echo "Registering Azure resource providers..."
            az provider register --namespace Microsoft.Purview --wait
            az provider register --namespace Microsoft.Monitor --wait
            az provider register --namespace Microsoft.Security --wait
            az provider register --namespace Microsoft.OperationalInsights --wait
            az provider register --namespace Microsoft.OperationsManagement --wait
            az provider register --namespace Microsoft.Insights --wait
            echo "All providers registered successfully"

      - name: Deploy Bicep Infrastructure
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: "Epiq-PROD-RG"
          template: ./bicep-azure/main.bicep
          failOnStdErr: false