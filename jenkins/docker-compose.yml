version: '3.8'
services:
  jenkins-auditor:
    image: jenkins/jenkins:lts
    container_name: epiq-jenkins-auditor
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_data:/var/jenkins_home
      - //var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS="-Djenkins.install.runSetupWizard=true"
      # IM8: AWS credentials are stored in Jenkins Credentials Manager
      # NOT as environment variables. Run terraform output to get keys
      # then add them via Jenkins UI: Manage Jenkins > Credentials

      